.gr{display:flex;gap:4px;justify-content:center;margin-top:4px;align-items:center;flex-shrink:0;flex-wrap:wrap}.grb{border:none;background:var(--btn-bg);border-radius:10px;padding:2px 10px;font-size:9px;font-weight:600;cursor:pointer;color:var(--btn-text);transition:.2s;min-width:30px;line-height:1.6}.grb.on{background:var(--accent);color:#fff}.grb:hover{background:var(--btn-hover)}.grb.on:hover{background:var(--accent-dark)}

</style></head><body>

var actx=null;
function initAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();}
function playSnd(type){
  if(muted||!actx)return;
  var o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);
  var t=actx.currentTime;
  if(type==='eat'){o.frequency.setValueAtTime(660,t);o.frequency.exponentialRampToValueAtTime(880,t+.06);g.gain.setValueAtTime(.08,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);o.start(t);o.stop(t+.08);}
  else if(type==='die'){o.frequency.setValueAtTime(400,t);o.frequency.exponentialRampToValueAtTime(100,t+.2);g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);o.start(t);o.stop(t+.2);}

}

{id:'apple',emoji:'🍎',pts:1,wt:30,color:'#ff3b3b'},{id:'orange',emoji:'🍊',pts:2,wt:20,color:'#ff9800'},{id:'grape',emoji:'🍇',pts:3,wt:15,color:'#9c27b0'},{id:'cherry',emoji:'🍒',pts:4,wt:12,color:'#e91e63'},{id:'watermelon',emoji:'🍉',pts:5,wt:10,color:'#4caf50'},{id:'clover',emoji:'🍀',pts:0,wt:8,color:'#00e676'},{id:'star',emoji:'⭐',pts:8,wt:5,color:'#ffd600'},

function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function occ(extra){var o=new Set();S.sn.forEach(function(n){n.b.forEach(function(b){o.add(b.x+','+b.y);});});if(S.sn2&&S.is2P)S.sn2.forEach(function(n){n.b.forEach(function(b){o.add(b.x+','+b.y);});});S.fd.forEach(function(f){o.add(f.x+','+f.y);});S.items.forEach(function(it){o.add(it.x+','+it.y);});if(S.walls)S.walls.forEach(function(w){o.add(w.x+','+w.y);});if(S.aiSn)S.aiSn.forEach(function(n){n.b.forEach(function(b){o.add(b.x+','+b.y);});});if(extra)extra.forEach(function(p){o.add(p.x+','+p.y);});return o;}
function fc(extra){var o=occ(extra),f=[];for(var x=0;x<SZ;x++)for(var y=0;y<SZ;y++)if(!o.has(x+','+y))f.push({x:x,y:y});return f;}
function spawnFoodNear(){

  var pool=far.length>0?far:free;
  if(pool.length>0){var p=pool[rnd(0,pool.length-1)];S.fd.push({x:p.x,y:p.y,type:pickFoodType()});}
}

function initAI(){var d=['right','left','up','down'][rnd(0,3)];var x=rnd(10,30),y=rnd(10,30),b=[];if(d==='right'){for(var i=0;i<3;i++)b.push({x:x-i,y:y});}else if(d==='left'){for(var i=0;i<3;i++)b.push({x:x+i,y:y});}else if(d==='up'){for(var i=0;i<3;i++)b.push({x:x,y:y+i});}else{for(var i=0;i<3;i++)b.push({x:x,y:y-i});}S.aiSn=[{b:b,d:d,n:d}];S.aiSc=0;S.aiDir=d;}

  if(S.mode==='levels'){var targets=[30,50,80,120,170,230,300,400];if(S.lvl<=8){var pct=Math.min(100,S.sc/targets[S.lvl-1]*100);ctx.fillStyle='rgba(0,0,0,.03)';ctx.fillRect(0,0,C.width,3);ctx.fillStyle=curT===1?'rgba(255,255,255,.3)':'rgba(0,0,0,.12)';ctx.fillRect(0,0,C.width*pct/100,3);}}

  if(S.is2P){ctx.fillStyle='rgba(220,50,60,.85)';ctx.font='bold 11px sans-serif';ctx.textAlign='right';ctx.textBaseline='top';ctx.fillText('🔴 P2: '+S.sc2,C.width-4,4);}
}
