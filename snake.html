<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"><title>Eaye蛇</title><link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231a73e8'/%3E%3Cpath d='M8 20L12 12L16 18L20 10L24 16' stroke='white' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='24' cy='16' r='3' fill='white'/%3E%3Ccircle cx='24' cy='16' r='1.2' fill='%231a73e8'/%3E%3C/svg%3E">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#f0f2f5;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Segoe UI,sans-serif;padding:12px}
.wrap{background:#fff;border-radius:16px;padding:12px;box-shadow:0 4px 24px rgba(0,0,0,.08);width:850px;max-width:100%;position:relative}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;padding:0 4px}
.tt{display:flex;align-items:center;gap:6px;font-size:16px;font-weight:700;color:#1a73e8}.tt svg{width:24px;height:24px}
.score{background:#eef2f7;padding:2px 14px;border-radius:20px;font-size:14px;font-weight:600;color:#555}
.score b{color:#1a73e8;font-size:18px}
canvas{display:block;background:#f8f9fb;border-radius:8px;width:100%;aspect-ratio:1/1;touch-action:none;border:1px solid #e4e8ef}
.btns{display:flex;gap:6px;justify-content:center;margin-top:6px}
.btn{border:none;border-radius:20px;padding:6px 20px;font-size:13px;font-weight:600;cursor:pointer;background:#eef2f7;color:#555}
.btn:hover{background:#e0e5ed}
.btn.blue{background:#1a73e8;color:#fff}
.btn.blue:hover{background:#0d47a1}
.hint{text-align:center;font-size:10px;color:rgba(0,0,0,.25);margin-top:4px}
.overlay{position:absolute;inset:0;background:rgba(255,255,255,.96);border-radius:16px;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:10;opacity:0;pointer-events:none;transition:.3s}
.overlay.on{opacity:1;pointer-events:auto}
.overlay h2{font-size:22px;color:#222;margin-bottom:4px}
.overlay p{font-size:12px;color:rgba(0,0,0,.35);margin-bottom:8px}
.big{border:none;background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;font-size:14px;font-weight:700;padding:10px 28px;border-radius:30px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.big:hover{transform:scale(1.04)}
.small{border:none;background:#eef2f7;color:#555;padding:6px 16px;border-radius:20px;font-size:11px;cursor:pointer;margin-top:4px}
</style></head><body>
<div class="wrap" id="W">
<div class="hdr"><div class="tt"><svg viewBox="0 0 32 32"><rect width="32" height="32" rx="8" fill="#1a73e8"/><path d="M8 20L12 12L16 18L20 10L24 16" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><circle cx="24" cy="16" r="3" fill="#fff"/><circle cx="24" cy="16" r="1.2" fill="#1a73e8"/></svg>Eaye蛇</div><div class="score">🍎 <b id="s">0</b></div></div>
<canvas id="C" width="800" height="800"></canvas>
<div class="hint"><kbd>↑↓←→</kbd> 或 <kbd>WASD</kbd> 控制 · <kbd>空格</kbd> 暂停</div>
<div class="btns"><button class="btn" id="pB">⏸ 暂停</button><button class="btn blue" id="rB">🔄 重新开始</button></div>

<div class="overlay on" id="m">
  <h2><svg width="28" height="28" viewBox="0 0 32 32"><rect width="32" height="32" rx="8" fill="#1a73e8"/><path d="M8 20L12 12L16 18L20 10L24 16" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><circle cx="24" cy="16" r="3" fill="#fff"/><circle cx="24" cy="16" r="1.2" fill="#1a73e8"/></svg> Eaye蛇</h2><p>经典贪吃蛇 · 穿墙模式</p>
  <button class="big" id="sB">🎮 开始游戏</button>
</div>
<div class="overlay" id="go">
  <h2>💀 游戏结束</h2><p>得分: <b id="goS">0</b></p>
  <button class="big" id="goR">再来一局</button><button class="small" id="goM">返回菜单</button>
</div>
</div>

<script>
var C=document.getElementById('C'),ctx=C.getContext('2d');
var sEl=document.getElementById('s'),mEl=document.getElementById('m'),goEl=document.getElementById('go');
var sB=document.getElementById('sB'),pB=document.getElementById('pB'),rB=document.getElementById('rB');
var goS=document.getElementById('goS'),goR=document.getElementById('goR'),goM=document.getElementById('goM');

var SZ=40,CL=C.width/SZ,my=Math.floor(SZ/2);
var S={p:'menu',t:null,sn:[],fd:[],sc:0,pa:false};

function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function occ(){var o=new Set();S.sn.forEach(function(n){n.b.forEach(function(b){o.add(b.x+','+b.y);});});S.fd.forEach(function(f){o.add(f.x+','+f.y);});return o;}
function fc(){var o=occ(),f=[];for(var x=0;x<SZ;x++)for(var y=0;y<SZ;y++)if(!o.has(x+','+y))f.push({x:x,y:y});return f;}

function init(){
  if(S.t){clearInterval(S.t);S.t=null;}
  S={p:'menu',t:null,sn:[],fd:[],sc:0,pa:false};
  S.sn.push({b:[{x:4,y:my},{x:3,y:my},{x:2,y:my}],d:'right',n:'right'});
  S.fd.push({x:rnd(5,35),y:rnd(2,38)});
  sEl.textContent='0';draw();
}

function start(){
  S.p='play';S.pa=false;
  mEl.classList.remove('on');goEl.classList.remove('on');
  pB.textContent='⏸ 暂停';
  S.t=setInterval(tk,140);draw();
}

function tk(){
  if(S.p!=='play'||S.pa)return;
  var sn=S.sn[0],op={up:'down',down:'up',left:'right',right:'left'};
  if(sn.n&&sn.n!==op[sn.d])sn.d=sn.n;
  var nx=sn.b[0].x,ny=sn.b[0].y;
  if(sn.d==='up')ny--;else if(sn.d==='down')ny++;else if(sn.d==='left')nx--;else nx++;
  nx=((nx%SZ)+SZ)%SZ;ny=((ny%SZ)+SZ)%SZ;
  for(var i=0;i<sn.b.length;i++)if(sn.b[i].x===nx&&sn.b[i].y===ny){end();return;}
  sn.b.unshift({x:nx,y:ny});
  var ate=false;
  for(var i=0;i<S.fd.length;i++)if(nx===S.fd[i].x&&ny===S.fd[i].y){
    S.sc++;sEl.textContent=S.sc;S.fd.splice(i,1);
    var f=fc();if(f.length>0){var p=f[rnd(0,f.length-1)];S.fd.push({x:p.x,y:p.y});}ate=true;break;
  }
  if(!ate)sn.b.pop();draw();
}

function end(){
  S.p='end';if(S.t){clearInterval(S.t);S.t=null;}
  goS.textContent=S.sc;goEl.classList.add('on');draw();
}

function tp(){
  if(S.p!=='play')return;
  if(!S.pa){S.pa=true;if(S.t){clearInterval(S.t);S.t=null;}pB.textContent='▶ 继续';draw();}
  else{S.pa=false;S.t=setInterval(tk,140);pB.textContent='⏸ 暂停';draw();}
}

function bk(){if(S.t){clearInterval(S.t);S.t=null;}S.p='menu';goEl.classList.remove('on');mEl.classList.add('on');draw();}

function draw(){
  ctx.clearRect(0,0,C.width,C.height);
  ctx.strokeStyle='rgba(0,0,0,.01)';ctx.lineWidth=.3;
  for(var i=0;i<=SZ;i++){ctx.beginPath();ctx.moveTo(i*CL,0);ctx.lineTo(i*CL,C.height);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*CL);ctx.lineTo(C.width,i*CL);ctx.stroke();}
  S.fd.forEach(function(f){var cx=f.x*CL+CL/2,cy=f.y*CL+CL/2;ctx.fillStyle='#ff3b3b';ctx.beginPath();ctx.arc(cx,cy,CL/2-3,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,.3)';ctx.beginPath();ctx.arc(cx-CL/6,cy-CL/6,CL/8,0,Math.PI*2);ctx.fill();});
  var sn=S.sn[0];for(var i=0;i<sn.b.length;i++){var se=sn.b[i],sx=se.x*CL,sy=se.y*CL,ih=i===0;var t=i/Math.max(sn.b.length-1,1),r=Math.round(37-t*30),g=Math.round(99-t*50),b=Math.round(235-t*40);ctx.fillStyle='rgb('+r+','+g+','+b+')';ctx.beginPath();ctx.roundRect(sx+1,sy+1,CL-2,CL-2,ih?4:2);ctx.fill();
    if(ih){var cx=se.x*CL+CL/2,cy=se.y*CL+CL/2,eo=4,er=2.5;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(cx-eo,cy-eo,er,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+eo,cy-eo,er,0,Math.PI*2);ctx.fill();ctx.fillStyle='#111';ctx.beginPath();ctx.arc(cx+eo+1,cy-eo,1.1,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx-eo+1,cy-eo,1.1,0,Math.PI*2);ctx.fill();}}
  if(S.pa){ctx.fillStyle='rgba(255,255,255,.55)';ctx.fillRect(0,0,C.width,C.height);ctx.fillStyle='rgba(0,0,0,.5)';ctx.beginPath();ctx.roundRect(C.width/2-100,C.height/2-50,200,100,12);ctx.fill();ctx.fillStyle='#fff';ctx.font='28px "Segoe UI",sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('⏸ 已暂停',C.width/2,C.height/2-8);}
}

document.addEventListener('keydown',function(e){
  var k=e.key;if(k==='ArrowUp'||k==='ArrowDown'||k==='ArrowLeft'||k==='ArrowRight'||k===' ')e.preventDefault();
  if(k===' '){if(S.p==='menu'){init();start();}else if(S.p==='end'){init();start();}else if(S.p==='play')tp();return;}
  if(S.p!=='play'||S.pa)return;
  var m={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',w:'up',W:'up',s:'down',S:'down',a:'left',A:'left',d:'right',D:'right'};
  if(m[k])S.sn[0].n=m[k];
});
var tx=0,ty=0;C.addEventListener('touchstart',function(e){var t=e.touches[0];tx=t.clientX;ty=t.clientY;},{passive:true});
C.addEventListener('touchend',function(e){if(S.p!=='play'||S.pa)return;var t=e.changedTouches[0],dx=t.clientX-tx,dy=t.clientY-ty;if(Math.abs(dx)<15&&Math.abs(dy)<15)return;S.sn[0].n=Math.abs(dx)>Math.abs(dy)?(dx>0?'right':'left'):(dy>0?'down':'up');});

sB.onclick=function(){init();start();};
goR.onclick=function(){init();start();};
rB.onclick=function(){init();start();};
pB.onclick=tp;
goM.onclick=bk;

init();draw();
</script></body></html>
